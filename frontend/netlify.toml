# netlify.toml
# Configuration for hosting the static frontend on Netlify

[[redirects]]
  from = "/api/*"
  to = "https://devserver-main--quiet-froyo-d705bd.netlify.app/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
